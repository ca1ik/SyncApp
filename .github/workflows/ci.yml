name: Sync CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.24.0"
  JAVA_VERSION: "17"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Analiz + Testler
  # ─────────────────────────────────────────────────────────────
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Android build için)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: sync_app
        run: flutter pub get

      - name: Run code generation (build_runner)
        working-directory: sync_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        working-directory: sync_app
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        working-directory: sync_app
        run: flutter test --coverage --reporter=expanded
        env:
          # Firebase test ortamı için sahte değerler
          FIREBASE_PROJECT_ID: "sync-app-test"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: sync_app/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # 2. Android Release APK
  # ─────────────────────────────────────────────────────────────
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze_and_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: sync_app
        run: flutter pub get

      - name: Run code generation
        working-directory: sync_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > sync_app/android/app/release.jks
        shell: bash

      - name: Create key.properties (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          cat > sync_app/android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF
        shell: bash

      - name: Build release APK (main)
        if: github.ref == 'refs/heads/main'
        working-directory: sync_app
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Build debug APK (other branches)
        if: github.ref != 'refs/heads/main'
        working-directory: sync_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-app-apk
          path: |
            sync_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 14
